<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Supervisión MP · S13 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0ede8;--card:#fff;--card2:#f8f7f5;--bord:#e0dbd4;--bord2:#ccc8c0;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;
  --ok:#1E8449;--ok-bg:#eaf7ef;--ok-bd:#a8dbb9;
  --no:#C0392B;--no-bg:#fdf0ef;--no-bd:#f5b8b3;
  --pen:#854F0B;--pen-bg:#fdf6e3;--pen-bd:#f5d99a;
  --ext:#185FA5;--ext-bg:#e8f0fb;
  --l1:#C0392B;--l2:#E67E22;--l3:#8E44AD;--l4:#1A5276;--l4a:#1E8449;--l5:#27AE60;--l6:#16A085;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1918;--card:#242220;--card2:#1e1c1a;--bord:#3a3630;--bord2:#4a4540;
  --txt:#f0ede8;--txt2:#aaa;--txt3:#666;
  --ok:#27AE60;--ok-bg:#1a2e22;
  --no:#E24B4A;--no-bg:#2e1a1a;
  --pen:#EF9F27;--pen-bg:#2e2415;
  --ext:#378ADD;--ext-bg:#1a2540;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* SYNC BANNER */
.sync-bar{background:var(--txt);color:#fff;font-size:11px;text-align:center;padding:4px 12px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:24px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#27AE60;flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:#F39C12;animation:pulse .8s infinite}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* TOP */
.top{background:var(--txt);color:#fff;padding:10px 14px;position:sticky;top:24px;z-index:100;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.top-title{flex:1;min-width:160px}
.top-title h1{font-size:13px;font-weight:600}
.top-title p{font-size:10px;opacity:.6;margin-top:1px}
.ctrs{display:flex;gap:5px}
.ctr{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;border:none}
.ctr-ok{background:var(--ok-bg);color:var(--ok)}
.ctr-no{background:var(--no-bg);color:var(--no)}
.ctr-pen{background:var(--pen-bg);color:var(--pen)}

/* TOOLBAR */
.bar{background:var(--card);border-bottom:0.5px solid var(--bord);padding:8px 12px;position:sticky;top:74px;z-index:99;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.bar input,.bar select{padding:7px 10px;border:1px solid var(--bord2);border-radius:8px;font-size:12px;background:var(--card2);color:var(--txt);outline:none}
.bar input{flex:1;min-width:150px}
.btn-add{padding:7px 13px;border:none;border-radius:8px;background:var(--ext);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* DÍA TABS */
.day-tabs{display:flex;overflow-x:auto;gap:0;background:var(--card);border-bottom:0.5px solid var(--bord);padding:0 10px;scrollbar-width:none;position:sticky;top:114px;z-index:98}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:9px 14px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}
.day-tab.active{color:var(--txt);border-bottom-color:var(--txt)}
.day-tab .n{font-size:10px;margin-left:4px;background:var(--bord);padding:1px 5px;border-radius:8px}

/* MAIN */
.main{padding:10px 10px 90px}

/* SECCIÓN ESTACIÓN */
.est-blk{margin-bottom:8px;border-radius:12px;overflow:hidden;border:0.5px solid var(--bord)}
.est-hdr{padding:9px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--card2);border-bottom:0.5px solid var(--bord)}
.est-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.est-nm{font-size:13px;font-weight:600;flex:1}
.est-mt{font-size:10px;color:var(--txt3)}
.est-chv{font-size:10px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.est-chv.op{transform:rotate(180deg)}
.est-body{display:none;padding:8px;background:var(--card)}
.est-body.op{display:block}

/* CARD EQUIPO */
.eq{border:1px solid var(--bord);border-radius:10px;margin-bottom:7px;background:var(--card);overflow:hidden}
.eq.s-ok{border-left:3px solid var(--ok)}
.eq.s-no{border-left:3px solid var(--no)}
.eq.s-pen{border-left:3px solid var(--bord2)}
.eq.s-ext{border-left:3px solid var(--ext)}
.eq-top{padding:9px 12px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.eq-cod{font-size:14px;font-weight:600;line-height:1.2}
.eq-bgs{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0}
.bg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap}
.bg-l1{background:#fde8e8;color:#7B241C}.bg-l2{background:#fef0e0;color:#7B5204}
.bg-l3{background:#f2e8fb;color:#5B2C6F}.bg-l4{background:#e8f0fb;color:#1A4A80}
.bg-l4a{background:#e8f8ef;color:#145A32}.bg-l5{background:#eafbf0;color:#145A32}
.bg-l6{background:#e8f8f5;color:#0E6655}
.bg-asc{background:#E6F1FB;color:#0C447C}.bg-esc{background:#f5f5f5;color:#444}
.bg-pla{background:#faeeda;color:#854F0B}.bg-prog{background:#f0f0f0;color:#555}
.bg-acta{background:#f2e8fb;color:#5B2C6F}.bg-ext{background:var(--ext-bg);color:var(--ext)}
.bg-crit{background:#FCEBEB;color:#A32D2D}.bg-alta{background:#faeeda;color:#854F0B}
.eq-est{padding:1px 12px 5px;font-size:11px;color:var(--txt2)}
.eq-inf{padding:2px 12px 7px;display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:11px;color:var(--txt2)}
.eq-inf strong{color:var(--txt);font-size:11px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--ok);display:inline-block;margin-left:3px;opacity:0;transition:opacity .3s}
.sdot.sh{opacity:1}

/* REGISTRO */
.eq-reg{border-top:0.5px solid var(--bord);padding:9px 12px}
.est-btns{display:flex;gap:5px;margin-bottom:7px}
.eb{flex:1;padding:8px 3px;border:1.5px solid var(--bord2);border-radius:8px;font-size:11px;font-weight:600;background:var(--card2);color:var(--txt2);cursor:pointer;text-align:center}
.eb.a-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.eb.a-no{background:var(--no-bg);border-color:var(--no);color:var(--no)}
.eb.a-pen{background:var(--pen-bg);border-color:var(--pen);color:var(--pen)}
.flds{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.flds.one{grid-template-columns:1fr}
.fld{display:flex;flex-direction:column;gap:2px}
.fld label{font-size:10px;color:var(--txt3);font-weight:500}
.fld input,.fld textarea{padding:7px 8px;border:1px solid var(--bord2);border-radius:6px;font-size:12px;background:var(--card2);color:var(--txt);outline:none;font-family:inherit}
.fld textarea{resize:none;height:52px;line-height:1.4}
.ver-row{margin-top:6px;padding-top:6px;border-top:0.5px dashed var(--bord)}
.ver-lbl{font-size:10px;color:var(--txt3);font-weight:500;margin-bottom:3px}
.ver-btns{display:flex;gap:4px;flex-wrap:wrap}
.vb{padding:5px 9px;border:1px solid var(--bord2);border-radius:6px;font-size:11px;font-weight:500;background:var(--card2);color:var(--txt2);cursor:pointer}
.vb.a-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.vb.a-no{background:var(--no-bg);border-color:var(--no);color:var(--no)}
.eq-om{font-size:10px;color:var(--txt3);padding:0 12px 8px;margin-top:-4px}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.ov.op{display:flex}
.modal{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:20px 18px 30px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.modal .fld{margin-bottom:10px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.btn-can{flex:1;padding:10px;border:1px solid var(--bord2);border-radius:8px;background:var(--card2);color:var(--txt2);font-size:13px;cursor:pointer}
.btn-ok{flex:2;padding:10px;border:none;border-radius:8px;background:var(--ext);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.modal .fld select,.modal .fld input{padding:7px 8px;border:1px solid var(--bord2);border-radius:6px;font-size:12px;background:var(--card2);color:var(--txt);outline:none;width:100%}

/* FAB */
.fab{position:fixed;bottom:18px;right:14px;background:var(--txt);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;z-index:150;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.empty{text-align:center;padding:40px;color:var(--txt3);font-size:13px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--txt3);font-size:13px}
.spin{width:28px;height:28px;border:3px solid var(--bord2);border-top-color:var(--txt);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    <div class="modal-btns">

      <button class="btn-ok" onclick="agregarExtra()">Agregar</button>

  </div>
</div>

// ── SYNC CON JSONBIN ───────────────────────────────────────────────────────

function setSyncState(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  txt.textContent = msg;
}

async function cargarDesdeNube() {
  setSyncState('syncing','Cargando desde la nube...');
  try {
    const res = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const record = data.record || {};
    regs   = record.regs   || {};
    extras = record.extras || [];
    equipos = [...PROGRAMA.actividades, ...extras];
    syncOk = true;
    const now = new Date().toLocaleTimeString('es-CL', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastSync').textContent = 'Sync ' + now;
    setSyncState('ok', 'Sincronizado · ' + now);
  } catch(e) {
    setSyncState('error', 'Sin conexión — datos locales');
    // Fallback a localStorage
    try {
      const s = localStorage.getItem('mp_s13_local');
      if (s) { const p = JSON.parse(s); regs=p.regs||{}; extras=p.extras||[]; equipos=[...PROGRAMA.actividades,...extras]; }
    } catch(_) {}
  }
  buildTabs();
  render();
}

async function guardarEnNube() {
  const payload = { regs, extras };
  // Guardar localmente siempre (backup offline)
  try { localStorage.setItem('mp_s13_local', JSON.stringify(payload)); } catch(_) {}
  // Guardar en nube
  setSyncState('syncing', 'Guardando...');
  try {
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: HEADERS,
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const now = new Date().toLocaleTimeString('es-CL', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastSync').textContent = 'Sync ' + now;
    setSyncState('ok', 'Guardado · ' + now);
  } catch(e) {
    setSyncState('error', 'Error al guardar — reintentando...');
    // Reintentar en 5 seg
    setTimeout(() => guardarEnNube(), 5000);
  }
}

function scheduleSave() {
  // Debounce: espera 800ms sin cambios antes de guardar
  clearTimeout(saveTimer);
  saveTimer = setTimeout(guardarEnNube, 800);
}

// ── HELPERS ───────────────────────────────────────────────────────────────

function getReg(id) {
  if (!regs[id]) regs[id] = {estado:'pendiente',inicio:'',fin:'',tecnico:'',comentario:'',verif:''};
  return regs[id];
}

function toggleFiltroEstado(e) {
  filtroEstado = (filtroEstado===e) ? null : e;
  render();
}

function buildTabs() {
  const dias = DIAS_ORDER.filter(d => equipos.some(e=>e.fecha===d));
  document.getElementById('dayTabs').innerHTML = dias.map(d => {
    const n = equipos.filter(e=>e.fecha===d).length;
    return `<div class="day-tab${d===diaActivo?' active':''}" onclick="setDia('${d}')">${DIAS_ES[d]||d} <span class="n">${n}</span></div>`;
  }).join('');
}

function setDia(d) { diaActivo=d; buildTabs(); render(); }

      <div class="flds">
        <div class="fld"><label>Hora inicio</label>
          <input type="time" value="${r.inicio}" oninput="setFld('${e.id}','inicio',this.value)"></div>
        <div class="fld"><label>Hora término</label>
          <input type="time" value="${r.fin}" oninput="setFld('${e.id}','fin',this.value)"></div>
      </div>
      <div class="flds one">
        <div class="fld"><label>Técnico que ejecutó</label>
          <input type="text" placeholder="Nombre del técnico" value="${r.tecnico}" oninput="setFld('${e.id}','tecnico',this.value)"></div>
      </div>
      <div class="flds one">
        <div class="fld"><label>Comentarios</label>
          <textarea placeholder="Observaciones, incidencias..." oninput="setFld('${e.id}','comentario',this.value)">${r.comentario}</textarea></div>
      </div>
      <div class="ver-row">
        <div class="ver-lbl">Verificación post-turno (CC / SAP)</div>
        <div class="ver-btns">
          <button class="vb${r.verif==='cc'?' a-ok':''}" onclick="setFld('${e.id}','verif','cc');updCard('${e.id}')">✓ CC confirmó acceso</button>
          <button class="vb${r.verif==='sap'?' a-ok':''}" onclick="setFld('${e.id}','verif','sap');updCard('${e.id}')">✓ OM cerrada SAP</button>
          <button class="vb${r.verif==='nv'?' a-no':''}" onclick="setFld('${e.id}','verif','nv');updCard('${e.id}')">✗ Sin verificar</button>
        </div>
      </div>
    </div>
    <div class="eq-om">OM ${e.om_sap||'—'}</div>
  </div>`;
}

function updCard(id) {
  const el=document.getElementById('eq-'+id); if(!el) return;
  const e=equipos.find(x=>x.id===id); if(!e) return;
  const r=getReg(id);
  el.className='eq s-'+r.estado+(e.fuente==='Extra'?' s-ext':'');
}

function render() {
  const q=document.getElementById('q').value.toLowerCase();
  const fS=document.getElementById('fSis').value;

  const diaEqs = equipos.filter(e => {
    if (e.fecha!==diaActivo) return false;
    if (fS && e.sistema!==fS) return false;
    if (filtroEstado) { const r=regs[e.id]; if((r?r.estado:'pendiente')!==filtroEstado) return false; }
    if (q && ![e.codigo_equipo,e.estacion,e.om_sap,e.encargado,e.linea].some(x=>(x||'').toLowerCase().includes(q))) return false;
    return true;
  });

  const byEst={};
  diaEqs.forEach(e=>{
    const k=`${e.linea}|${e.estacion}`;
    if(!byEst[k]) byEst[k]={linea:e.linea,est:e.estacion,items:[]};
    byEst[k].items.push(e);
  });

  const sorted=Object.values(byEst).sort((a,b)=>(LINEA_ORDER[a.linea]||9)-(LINEA_ORDER[b.linea]||9)||a.est.localeCompare(b.est,'es'));

  const main=document.getElementById('main');
  if(!sorted.length){main.innerHTML='<div class="empty">Sin resultados para los filtros aplicados.</div>';updCounters();return;}

  main.innerHTML=sorted.map(g=>{
    const k=`${g.linea}|${g.est}`;
    const isOp=openSecs.has(k);
    const lk=g.linea==='L4A'?'l4a':g.linea.toLowerCase();
    const done=g.items.filter(e=>{const r=regs[e.id];return r&&r.estado==='ok';}).length;
    return `<div class="est-blk">
      <div class="est-hdr" onclick="togSec('${k}')">
        <div class="est-dot" style="background:var(--${lk})"></div>
        <div class="est-nm">${g.est}</div>
        <div class="est-mt">${g.linea} · ${done}/${g.items.length}</div>
        <span class="est-chv${isOp?' op':''}" id="chv-${k.replace('|','-')}">▼</span>
      </div>
      <div class="est-body${isOp?' op':''}" id="sec-${k.replace('|','-')}">
        ${g.items.map(e=>cardHTML(e)).join('')}
      </div>
    </div>`;
  }).join('');

  updCounters();
}

function togSec(k) {
  if(openSecs.has(k)) openSecs.delete(k); else openSecs.add(k);
  const b=document.getElementById('sec-'+k.replace('|','-'));
  const c=document.getElementById('chv-'+k.replace('|','-'));
  if(b){b.classList.toggle('op');c&&c.classList.toggle('op');}
}

function setEst(id,est) { getReg(id).estado=est; scheduleSave(); updCard(id); updCounters(); flash(id); }

function setFld(id,f,v) {
  getReg(id)[f]=v; scheduleSave(); flash(id);
}

function flash(id) {
  const d=document.getElementById('dot-'+id);
  if(d){d.classList.add('sh');setTimeout(()=>d.classList.remove('sh'),1200);}
}

function updCounters() {
  const dia=equipos.filter(e=>e.fecha===diaActivo);
  const ok =dia.filter(e=>regs[e.id]&&regs[e.id].estado==='ok').length;
  const no =dia.filter(e=>regs[e.id]&&regs[e.id].estado==='no').length;
  const pen=dia.length-ok-no;
  document.getElementById('cOk').textContent=`✓ ${ok}`;
  document.getElementById('cNo').textContent=`✗ ${no}`;
  document.getElementById('cPen').textContent=`⏳ ${pen}`;
}

function openModal() {document.getElementById('ov').classList.add('op');}
function closeModal() {document.getElementById('ov').classList.remove('op');}

function agregarExtra() {
  const l=document.getElementById('mL').value;
  const e=document.getElementById('mE').value.trim();
  const c=document.getElementById('mC').value.trim();
  const s=document.getElementById('mS').value;
  const o=document.getElementById('mO').value.trim();
  const m=document.getElementById('mM').value.trim();
  if(!e||!c){alert('Completa estación y código.');return;}
  const id=`extra-${Date.now()}`;
  const nuevo={
    id, linea:l, estacion:e, sigla_estacion:'?', sistema:s,
    codigo_equipo:c, om_sap:o, tipo_mp:'Manual',
    dia_semana:'—', fecha:diaActivo, turno:'NOCTURNO', fuente:'Extra',
    encargado:'', fono:'', modelo:null, fallas_2025:null, criticos_2025:null, en_bi:false
  };
  extras.push(nuevo);
  equipos.push(nuevo);
  regs[id]={estado:'pendiente',inicio:'',fin:'',tecnico:'',comentario:m?`Motivo: ${m}`:'',verif:''};
  scheduleSave();
  closeModal(); buildTabs(); render();
  ['mE','mC','mO','mM'].forEach(x=>document.getElementById(x).value='');
}

function exportar() {
  const meta=PROGRAMA.meta;
  let txt=`SUPERVISIÓN MP NOCTURNO — SEMANA ${meta.semana} ${meta.año}\n`;
  txt+=`Exportado: ${new Date().toLocaleString('es-CL')}\n`;
  txt+='='.repeat(56)+'\n';

  DIAS_ORDER.forEach(fecha=>{
    const dEqs=equipos.filter(e=>e.fecha===fecha);
    if(!dEqs.length) return;
    txt+=`\n📅 ${DIAS_ES[fecha]||fecha}\n${'-'.repeat(40)}\n`;
    const byEst={};
    dEqs.forEach(e=>{const k=`${e.linea}|${e.estacion}`;if(!byEst[k])byEst[k]=[];byEst[k].push(e);});
    Object.values(byEst).forEach(items=>{
      txt+=`\n  ${items[0].linea} — ${items[0].estacion}\n`;
      items.forEach(e=>{
        const r=regs[e.id]||{};
        const el={ok:'REALIZADO',no:'NO REALIZADO',pendiente:'PENDIENTE'}[r.estado||'pendiente'];
        txt+=`    [${el}] ${e.sistema} ${e.codigo_equipo}  OM: ${e.om_sap||'—'}\n`;
        if(r.inicio||r.fin) txt+=`      Horario: ${r.inicio||'?'} – ${r.fin||'?'}\n`;
        if(r.tecnico) txt+=`      Técnico: ${r.tecnico}\n`;
        if(r.comentario) txt+=`      Nota: ${r.comentario}\n`;
        const vl={cc:'CC confirmó acceso',sap:'OM cerrada SAP',nv:'Sin verificar',''}[r.verif||''];
        txt+=`      Verif: ${vl||'—'}\n`;
      });
    });
  });

  const totOk=equipos.filter(e=>regs[e.id]&&regs[e.id].estado==='ok').length;
  const totNo=equipos.filter(e=>regs[e.id]&&regs[e.id].estado==='no').length;
  txt+=`\n$========================================================\nRESUMEN: ${totOk} realizados | ${totNo} no realizados | ${equipos.length-totOk-totNo} pendientes | Total: ${equipos.length}\n`;

  const b=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`Supervision_MP_S${meta.semana}_${meta.año}.txt`;a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────
DIAS_ORDER.forEach(d=>{
  const ests=new Set(equipos.filter(e=>e.fecha===d).map(e=>`${e.linea}|${e.estacion}`));
  ests.forEach(k=>openSecs.add(k));
});
cargarDesdeNube();
</script>
</body>
